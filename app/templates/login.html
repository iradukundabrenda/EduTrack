<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EduTrack</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      text-align: center;
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 2rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid #e8e8e8;
      border-radius: 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 1.2rem;
    }
    input:focus { border-color: #4cc9f0; }
    button {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, #4cc9f0, #4361ee);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 0.5rem;
    }
    button:hover { opacity: 0.88; }
    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #aaa;
    }
    .footer a { color: #4361ee; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    .alert {
      background: #fff0f3;
      border: 1px solid #ffd6e7;
      color: #f72585;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📚</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to track your learning goals</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com" required />
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required />
      <button type="submit">Log In</button>
    </form>

    <div class="footer">
      Don't have an account? <a href="{{ url_for('main.register') }}">Register</a>
    </div>
  </div>
</body>
</html>
